name: Bug Report
description: Something isn't working as expected
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: SideDNS version
      description: Output of `sidedns --version`
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: Ubuntu 24.04 / macOS 14.5 / Windows 11 23H2

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. sidedns daemon start
        2. sidedns add api.local --port 3000
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: |
        Run with `daemon start --no-background` or include logs from SideDNS in the SideDNS data directory.
        Paths may include:
        - Linux: `$XDG_DATA_HOME/sidedns/logs` or `$HOME/.local/share/sidedns/logs`
        - macOS: `$HOME/Library/Application Support/SideDNS/logs`
        - Windows: `%LOCALAPPDATA%\SideDNS\logs`
      render: shell
