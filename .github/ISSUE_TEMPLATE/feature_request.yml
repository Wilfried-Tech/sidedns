name: Feature Request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature.
        Before submitting, please check if an issue already exists for it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CLI command
        - DNS routing
        - HTTP/HTTPS proxy
        - Certificate management
        - Daemon lifecycle
        - Platform support
        - Documentation
        - Other
    validations:
      required: true
